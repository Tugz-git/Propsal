<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.2rem;
            margin-bottom: 40px;
        }

        /* This keeps them side-by-side: No on Left, Yes on Right */
        .btn-container {
            display: flex;
            justify-content: space-around;
            position: relative;
            height: 60px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 110px;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            transition: transform 0.2s;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #777;
            color: white;
            /* Using transition for a smooth gliding getaway */
            transition: all 0.1s ease; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="question">Will you be my girlfriend? 💖</h1>
        <div class="btn-container">
            <!-- No on Left, Yes on Right -->
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
            <button id="yesBtn" onclick="celebrate()">Yes</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // The magic trick: As soon as she hovers, we switch it to fixed position 
            // so it can break out of the box and fly anywhere on the screen
            noBtn.style.position = 'fixed';
            
            // Calculate a random spot anywhere on her screen
            // Subtracting 120 so it doesn't accidentally fly off the visible edge
            const x = Math.random() * (window.innerWidth - 120);
            const y = Math.random() * (window.innerHeight - 60);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function celebrate() {
            document.getElementById('question').innerHTML = "Yay! I knew you'd say yes! 🥰❤️";
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('yesBtn').style.transform = 'scale(1.4)';
            document.getElementById('yesBtn').disabled = true;
        }
    </script>

</body>
</html>
